hand skeleton skech model
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hand Skeleton Drawing + Palm Erase + Finger Fold (Fixed)</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        background: black;
    }
    video {
        position: absolute;
        visibility: hidden;
    }
    canvas {
        position: absolute;
        top: 0;
        left: 0;
    }
</style>
</head>

<body>

<video id="video" autoplay muted playsinline></video>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from "three";
import { HandLandmarker, FilesetResolver } from
"https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

// ================= GLOBALS =================
let scene, camera, renderer;
let handLandmarker;
const video = document.getElementById("video");
const joints = [];
const bones = [];

// ================= DRAWING =================
let drawPoints = [];
let drawGeometry, drawLine;

// ================= PALM ERASE =================
let lastPalmPos = null;
const ERASE_THRESHOLD = 0.6;

// ================= SCENE =================
scene = new THREE.Scene();

camera = new THREE.PerspectiveCamera(
    70,
    window.innerWidth / window.innerHeight,
    0.1,
    100
);
camera.position.z = 6;

renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ================= HAND CONNECTIONS =================
const HAND_CONNECTIONS = [
    [0,1],[1,2],[2,3],[3,4],
    [0,5],[5,6],[6,7],[7,8],
    [0,9],[9,10],[10,11],[11,12],
    [0,13],[13,14],[14,15],[15,16],
    [0,17],[17,18],[18,19],[19,20]
];

// ================= JOINTS =================
const jointGeo = new THREE.SphereGeometry(0.06, 16, 16);
const jointMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });

for (let i = 0; i < 21; i++) {
    const joint = new THREE.Mesh(jointGeo, jointMat);
    scene.add(joint);
    joints.push(joint);
}

// ================= BONES =================
const boneMat = new THREE.LineBasicMaterial({ color: 0xffffff });

HAND_CONNECTIONS.forEach(() => {
    const geo = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(),
        new THREE.Vector3()
    ]);
    const line = new THREE.Line(geo, boneMat);
    scene.add(line);
    bones.push(line);
});

// ================= DRAW LINE =================
drawGeometry = new THREE.BufferGeometry();
drawGeometry.setFromPoints(drawPoints);

const drawMaterial = new THREE.LineBasicMaterial({
    color: 0xff00ff
});

drawLine = new THREE.Line(drawGeometry, drawMaterial);
scene.add(drawLine);

// ================= MEDIAPIPE =================
async function initHand() {
    const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
    );

    handLandmarker = await HandLandmarker.createFromOptions(vision, {
        baseOptions: {
            modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task"
        },
        runningMode: "VIDEO",
        numHands: 1
    });

    startCamera();
}

// ================= CAMERA =================
async function startCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({
        video: { width: 640, height: 480 }
    });

    video.srcObject = stream;
    await video.play();
    requestAnimationFrame(loop);
}

// ================= LOOP =================
function loop() {
    if (video.readyState >= 2 && handLandmarker) {
        const results = handLandmarker.detectForVideo(
            video,
            performance.now()
        );

        if (results.landmarks?.length) {
            const hand = results.landmarks[0];

            // ===== UPDATE JOINTS (MIRROR) =====
            hand.forEach((p, i) => {
                const x = (0.5 - p.x) * 8;   // MIRROR X
                const y = -(p.y - 0.5) * 6;
                const z = -p.z * 4;

                joints[i].position.lerp(
                    new THREE.Vector3(x, y, z),
                    0.5
                );
            });

            // ===== UPDATE BONES =====
            HAND_CONNECTIONS.forEach(([a, b], i) => {
                const arr = bones[i].geometry.attributes.position.array;

                arr[0] = joints[a].position.x;
                arr[1] = joints[a].position.y;
                arr[2] = joints[a].position.z;

                arr[3] = joints[b].position.x;
                arr[4] = joints[b].position.y;
                arr[5] = joints[b].position.z;

                bones[i].geometry.attributes.position.needsUpdate = true;
            });

            // ===== INDEX FINGER FOLD CHECK =====
            // Tip = 8, PIP = 6, MCP = 5
            const tip = joints[8].position;
            const pip = joints[6].position;
            const mcp = joints[5].position;

            // Simple rule: finger folded if tip closer to MCP than PIP
            const distTipToMCP = tip.distanceTo(mcp);
            const distPIPToMCP = pip.distanceTo(mcp);

            const indexOpen = distTipToMCP > distPIPToMCP;

            // ===== DRAW WITH INDEX FINGER IF OPEN =====
            if (indexOpen) {
                drawPoints.push(tip.clone());
                if (drawPoints.length > 1200) drawPoints.shift();
                drawGeometry.setFromPoints(drawPoints);
            }

            // ===== ERASE ON PALM WAVE (WRIST = 0) =====
            const palm = joints[0].position.clone();
            if (lastPalmPos) {
                const speed = palm.distanceTo(lastPalmPos);
                if (speed > ERASE_THRESHOLD) {
                    drawPoints.length = 0;
                    drawGeometry.setFromPoints(drawPoints);
                }
            }
            lastPalmPos = palm;
        }
    }

    renderer.render(scene, camera);
    requestAnimationFrame(loop);
}

// ================= RESIZE =================
window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ================= START =================
initHand();
</script>

</body>
</html>
